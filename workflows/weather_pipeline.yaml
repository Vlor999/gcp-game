main:
  steps:
    - run_ingestion:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: projects/onboarding-de-willem-499614/locations/europe-west1/jobs/willem-meteo-ingest
          body: {}
        result: ingestion_result

    - create_compilation:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/projects/onboarding-de-willem-499614/locations/europe-west1/repositories/willem-meteo-dataform/compilationResults"}
          auth:
            type: OAuth2
          body:
            gitCommitish: willem
        result: compilation_result

    - run_dataform:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/projects/onboarding-de-willem-499614/locations/europe-west1/repositories/willem-meteo-dataform/workflowInvocations"}
          auth:
            type: OAuth2
          body:
            compilationResult: ${compilation_result.body.name}
        result: invocation_result

    - done:
        return: "Pipeline completed via Dataform"
