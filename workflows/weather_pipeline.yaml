main:
  steps:
    - run_ingestion:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: projects/onboarding-de/locations/europe-west1/jobs/max-meteo-ingest
          body: {}
        result: ingestion_result

    - create_compilation:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/projects/onboarding-de/locations/europe-west1/repositories/max-meteo-dataform/compilationResults"}
          auth:
            type: OAuth2
          body:
            gitCommitish: max
        result: compilation_result

    - run_dataform:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/projects/onboarding-de/locations/europe-west1/repositories/max-meteo-dataform/workflowInvocations"}
          auth:
            type: OAuth2
          body:
            compilationResult: ${compilation_result.body.name}
            invocationConfig:
              serviceAccount: max-meteo-workflow@onboarding-de.iam.gserviceaccount.com
        result: invocation_result

    - done:
        return: "Pipeline completed via Dataform"
