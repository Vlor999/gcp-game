main:
  steps:
    - run_ingestion:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: projects/${PROJECT_ID}/locations/${REGION}/jobs/${JOB_NAME}
          body: {}
        result: ingestion_result

    - create_compilation:
        call: googleapis.dataform.v1beta1.projects.locations.repositories.compilationResults.create
        args:
          parent: projects/${PROJECT_ID}/locations/${REGION}/repositories/${DATAFORM_REPO}
          body:
            gitCommitish: ${BRANCH_NAME}
        result: compilation_result

    - run_dataform:
        call: googleapis.dataform.v1beta1.projects.locations.repositories.workflowInvocations.create
        args:
          parent: projects/${PROJECT_ID}/locations/${REGION}/repositories/${DATAFORM_REPO}
          body:
            compilationResult: ${compilation_result.name}
        result: invocation_result

    - done:
        return: "Pipeline completed via Dataform"
