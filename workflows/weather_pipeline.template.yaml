main:
  steps:
    - run_ingestion:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: projects/${PROJECT_ID}/locations/${REGION}/jobs/${JOB_NAME}
          body: {}
        result: ingestion_result

    - create_compilation:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/projects/${PROJECT_ID}/locations/${REGION}/repositories/${DATAFORM_REPO}/compilationResults"}
          auth:
            type: OAuth2
          body:
            gitCommitish: ${BRANCH_NAME}
        result: compilation_result

    - run_dataform:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/projects/${PROJECT_ID}/locations/${REGION}/repositories/${DATAFORM_REPO}/workflowInvocations"}
          auth:
            type: OAuth2
          body:
            compilationResult: ${compilation_result.body.name}
        result: invocation_result

    - done:
        return: "Pipeline completed via Dataform"
